# ============================================================
# 1k1_portal — docker-compose
# Services: web (Drupal/Tripal/Apache), db (PostgreSQL)
# Note: SSL/reverse proxy handled by server's existing Nginx
# Usage:
#   cp .env.example .env        # fill in your values
#   docker compose up -d --build
# ============================================================

services:

  # ── Drupal + Tripal (Apache) ────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 1k1_portal_web
    restart: unless-stopped
    ports:
      - "8085:80"
    environment:
      DRUPAL_DB_HOST: db
      DRUPAL_DB_PORT: 5432
      DRUPAL_DB_NAME: ${TripalDB_NAME}
      DRUPAL_DB_USER: ${TripalDB_USER}
      DRUPAL_DB_PASSWORD: ${TripalDB_PASSWORD}
      DRUPAL_HASH_SALT: ${DRUPAL_HASH_SALT}
    volumes:
      - drupal_files:/opt/drupal/web/sites/default/files
      - drupal_config:/opt/drupal/config/sync
      - ./web/sites/default/settings.php:/opt/drupal/web/sites/default/settings.php:ro
      - ./web/themes:/opt/drupal/web/themes
    depends_on:
      db:
        condition: service_healthy
    networks:
      - portal_net

  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: 1k1_portal_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TripalDB_NAME}
      POSTGRES_USER: ${TripalDB_USER}
      POSTGRES_PASSWORD: ${TripalDB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TripalDB_USER} -d ${TripalDB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portal_net

# ── Named volumes ─────────────────────────────────────────────
volumes:
  db_data:
  drupal_files:
  drupal_config:

# ── Network ───────────────────────────────────────────────────
networks:
  portal_net:
    driver: bridge
