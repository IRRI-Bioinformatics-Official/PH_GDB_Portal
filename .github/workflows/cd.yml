name: CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy .env from server
        run: |
          cp /home/ec2-user/.env.phgdb .env || echo "No .env override found, using existing"

      - name: Build and restart containers
        run: docker compose up -d --build --remove-orphans

      - name: Wait for containers
        run: sleep 10

      - name: Run Drupal updates
        run: docker compose exec -T web /opt/drupal/vendor/bin/drush updatedb --yes

      - name: Import config
        run: docker compose exec -T web /opt/drupal/vendor/bin/drush config:import --yes

      - name: Rebuild cache
        run: docker compose exec -T web /opt/drupal/vendor/bin/drush cache:rebuild

      - name: Done
        run: echo "Deploy complete."
